<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f5f5f5">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>RemoteLab — Sign In</title>
  <style nonce="{{NONCE}}">
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: max(24px, env(safe-area-inset-top))
               max(24px, env(safe-area-inset-right))
               max(24px, env(safe-area-inset-bottom))
               max(24px, env(safe-area-inset-left));
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 32px 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    .error {
      background: #fef2f2;
      color: #dc2626;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .hidden { display: none !important; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    input[type=text],
    input[type=password] {
      display: block;
      width: 100%;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: #111;
      background: #fff;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.1s;
      margin-bottom: 12px;
    }

    input[type=text]:focus,
    input[type=password]:focus {
      border-color: #111;
    }

    .mono {
      font-family: ui-monospace, 'SFMono-Regular', 'Menlo', monospace;
      font-size: 13px;
    }

    .btn {
      display: block;
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      -webkit-appearance: none;
    }

    .btn:active { opacity: 0.8; }

    .switch {
      text-align: center;
      margin-top: 18px;
    }

    .switch a {
      font-size: 13px;
      color: #888;
      text-decoration: none;
    }

    .switch a:hover { color: #111; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">RemoteLab</div>
    <div class="tagline">Sign in to continue</div>

    <div class="error {{ERROR_CLASS}}">Invalid credentials. Please try again.</div>

    <!-- Password form -->
    <form id="pw-form" method="POST" action="/login">
      <input type="hidden" name="type" value="password">
      <label for="username-input">Username</label>
      <input type="text" id="username-input" name="username"
             placeholder="Enter username"
             autocomplete="username" autocorrect="off" autocapitalize="none">
      <label for="password-input">Password</label>
      <input type="password" id="password-input" name="password"
             placeholder="Enter password"
             autocomplete="current-password">
      <button type="submit" class="btn">Sign In</button>
    </form>

    <!-- Token form -->
    <form id="token-form" class="hidden" method="POST" action="/login">
      <input type="hidden" name="type" value="token">
      <label for="token-input">Access Token</label>
      <input type="text" id="token-input" name="token" class="mono"
             placeholder="Paste your token"
             autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <button type="submit" class="btn">Sign In</button>
    </form>

    <div class="switch">
      <a href="#" id="toggle-link">Use access token instead</a>
    </div>
  </div>

  <script nonce="{{NONCE}}">
    var tokenForm = document.getElementById('token-form');
    var pwForm = document.getElementById('pw-form');
    var toggleLink = document.getElementById('toggle-link');
    var usePw = '{{MODE}}' === 'pw';

    function applyMode() {
      if (usePw) {
        tokenForm.classList.add('hidden');
        pwForm.classList.remove('hidden');
        toggleLink.textContent = 'Use access token instead';
      } else {
        pwForm.classList.add('hidden');
        tokenForm.classList.remove('hidden');
        toggleLink.textContent = 'Use username & password';
      }
    }

    applyMode();

    toggleLink.addEventListener('click', function(e) {
      e.preventDefault();
      usePw = !usePw;
      applyMode();
    });
  </script>
</body>
</html>
