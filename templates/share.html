<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>RemoteLab Shared Snapshot</title>
<style>
:root {
  color-scheme: dark;
  --bg: #0b1020;
  --bg-secondary: #11192c;
  --bg-tertiary: #1a2741;
  --panel: rgba(11, 16, 32, 0.92);
  --text: #edf2ff;
  --text-secondary: #c8d2f0;
  --text-muted: #8f9bb8;
  --border: rgba(143, 155, 184, 0.22);
  --border-strong: rgba(143, 155, 184, 0.38);
  --accent: #8ab4ff;
  --accent-soft: rgba(138, 180, 255, 0.14);
  --success: #30d158;
  --warning: #ff9f0a;
  --error: #ff6b6b;
  --user: #1f6feb;
  --shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
}

* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top, rgba(138, 180, 255, 0.15), transparent 40%),
    linear-gradient(180deg, #0a0f1c 0%, #101726 100%);
  color: var(--text);
}

.page {
  width: min(920px, calc(100vw - 24px));
  margin: 0 auto;
  padding: calc(env(safe-area-inset-top) + 18px) 0 calc(env(safe-area-inset-bottom) + 32px);
}

.hero {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.hero-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--accent-soft);
  border: 1px solid rgba(138, 180, 255, 0.22);
  border-radius: 999px;
  padding: 7px 12px;
}

.hero h1 {
  margin: 14px 0 8px;
  font-size: clamp(22px, 4vw, 30px);
  line-height: 1.2;
}

.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 8px;
}

.hero-meta-item {
  font-size: 13px;
  color: var(--text-secondary);
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
}

.hero-note {
  margin-top: 12px;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.55;
}

.snapshot {
  margin-top: 16px;
  background: rgba(11, 16, 32, 0.88);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 14px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.messages-inner {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.empty-state {
  color: var(--text-muted);
  text-align: center;
  padding: 48px 16px;
  line-height: 1.6;
}

.msg-user {
  display: flex;
  justify-content: flex-end;
}

.msg-user-bubble {
  max-width: min(78ch, 92%);
  background: linear-gradient(180deg, rgba(31, 111, 235, 0.95), rgba(16, 92, 208, 0.92));
  color: white;
  border-radius: 18px 18px 4px 18px;
  padding: 11px 13px;
  line-height: 1.55;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}

.msg-images {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px;
  margin-bottom: 10px;
}

.msg-images img {
  width: 100%;
  display: block;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  cursor: zoom-in;
}

.msg-assistant,
.msg-system,
.usage-info,
.thinking-block,
.tool-card,
.file-card {
  max-width: 100%;
}

.msg-assistant {
  color: var(--text);
  line-height: 1.65;
  overflow-wrap: anywhere;
}

.msg-assistant p:first-child,
.msg-assistant ul:first-child,
.msg-assistant ol:first-child,
.msg-assistant pre:first-child,
.msg-assistant blockquote:first-child,
.msg-assistant h1:first-child,
.msg-assistant h2:first-child,
.msg-assistant h3:first-child {
  margin-top: 0;
}

.msg-assistant p:last-child,
.msg-assistant ul:last-child,
.msg-assistant ol:last-child,
.msg-assistant pre:last-child,
.msg-assistant blockquote:last-child {
  margin-bottom: 0;
}

.msg-assistant pre,
.tool-body pre,
.tool-result {
  margin: 0;
  background: #0b1221;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 12px;
  padding: 12px;
  overflow: auto;
  font-size: 12px;
  line-height: 1.5;
}

.msg-assistant code:not(pre code) {
  background: rgba(255, 255, 255, 0.08);
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 0.92em;
}

.msg-assistant a {
  color: #9ec5ff;
  text-decoration: none;
}

.msg-assistant a:hover { text-decoration: underline; }

.msg-system {
  align-self: center;
  font-size: 12px;
  color: var(--text-muted);
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 7px 11px;
}

.usage-info {
  align-self: center;
  font-size: 12px;
  color: var(--text-muted);
}

.thinking-block {
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.03);
  overflow: hidden;
}

.thinking-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 12px;
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
}

.thinking-header:hover { color: var(--text); }
.thinking-chevron { margin-left: auto; transition: transform 0.15s; font-size: 10px; }
.thinking-block.collapsed .thinking-chevron { transform: rotate(-90deg); }
.thinking-body {
  padding: 0 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.thinking-block.collapsed .thinking-body { display: none; }

.reasoning {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
  white-space: pre-wrap;
}

.tool-card,
.file-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.035);
  overflow: hidden;
}

.tool-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
}

.tool-name {
  font-weight: 600;
  color: var(--text);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

.tool-toggle {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 0.15s;
}

.tool-header.expanded .tool-toggle { transform: rotate(90deg); }

.tool-body {
  display: none;
  padding: 0 12px 12px;
}

.tool-body.expanded { display: block; }

.tool-result-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
  margin: 10px 0 8px;
}

.exit-code {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 11px;
}

.exit-code.ok { background: rgba(48, 209, 88, 0.16); color: #7dff9d; }
.exit-code.fail { background: rgba(255, 107, 107, 0.16); color: #ff9c9c; }

.file-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  font-size: 12px;
}

.file-path {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text-secondary);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

.change-type {
  border-radius: 999px;
  padding: 2px 8px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-size: 10px;
}

.change-type.create { background: rgba(48, 209, 88, 0.16); color: #7dff9d; }
.change-type.edit { background: rgba(138, 180, 255, 0.16); color: #9ec5ff; }
.change-type.delete { background: rgba(255, 107, 107, 0.16); color: #ff9c9c; }

.code-block-wrap {
  position: relative;
}

.code-copy-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(11, 16, 32, 0.82);
  color: var(--text-secondary);
  cursor: pointer;
}

.code-copy-btn:hover { color: var(--text); border-color: rgba(255, 255, 255, 0.24); }
.code-copy-btn.copied { color: #7dff9d; }
.code-copy-btn svg { width: 15px; height: 15px; }

@media (max-width: 640px) {
  .page {
    width: calc(100vw - 16px);
    padding-top: calc(env(safe-area-inset-top) + 12px);
    padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
  }

  .hero,
  .snapshot {
    border-radius: 16px;
    padding: 14px;
  }

  .msg-user-bubble {
    max-width: 100%;
  }
}
</style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-top">
        <div class="hero-badge" id="heroBadge">Read-only snapshot</div>
      </div>
      <h1 id="snapshotTitle">Shared session snapshot</h1>
      <div class="hero-meta" id="snapshotMeta"></div>
      <div class="hero-note" id="heroNote">This link exposes only this captured conversation snapshot. It cannot send messages, join a live session, or browse any other RemoteLab content.</div>
    </section>

    <section class="snapshot">
      <div class="messages-inner" id="messagesInner">
        <div class="empty-state">This snapshot is empty.</div>
      </div>
    </section>
  </div>

  <script nonce="{{NONCE}}">window.__REMOTELAB_SHARE__ = {{SNAPSHOT_JSON}};</script>
  <script nonce="{{NONCE}}" src="/marked.min.js?v={{ASSET_VERSION}}"></script>
  <script nonce="{{NONCE}}" src="/share.js?v={{ASSET_VERSION}}"></script>
</body>
</html>
